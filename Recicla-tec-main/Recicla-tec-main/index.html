<head>
    <meta charset="UTF-8">

    <!--link para o logotipo-->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <!--link para imagem da aba dos navegadores-->
    <link rel="shortcut icon" href="./favicon_io/favicon-16x16.png" type="image/x-icon">
    <title>CEEP - Recicla-tec</title>
    <!--link para o Estilo Externo-->
    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <header>
        <div class="logo">
            <h2>
                CEEP Cianorte</h2>
        </div>
        <nav>
            <a href="http://ceepcianorte.com.br">Início</a>
            <a href="#">Cursos</a>
            <a href="">E-Lixo (Descarte)</a>
        </nav>
    </header>
    <div class="hero">
        <h1>Campanha de Descarte de Lixo Eletrônico</h1>
        <p>Ajude o meio ambiente e o nosso colégio.
            Cadastre o equipamento que você deseja doar ou descartar!
        </p>
    </div>
    <div class="container">
        <h2>Formulário de Cadastro de E-Lixo</h2>
        <form action="/processar-descartar.php" method="post">
            <label for="nome">Seu Nome (Aluno/Professor/Comunidade):</label>
            <input type="text" id="nome" name="nome" required>

            <label for="contato">E-mail ou WhatsApp</label>
            <input type="text" id="" name="contato" name="contato" required>

            <label for="tipo_equipamento">Tipo de equipamento:</label>
            <select name="Tipo_de_equipamento" id="Tipo_de_equipamento">required
                <option value="">Seleciona...</option>
                <option value="computador">Computador / Notebook0</option>
                <option value="celular">Celular/ Tablet</option>
                <option value="periférico">Periférico (Teclado, Mouse, Cabos)</option>
                <option value="bateria">Pilhas e Baterias</option>
                <option value="outro">Outros (Especifique abaixo) </option>
            </select>
            <label for="estado">Estado do Equipamento:</label>
            <select id="estado" name="estado" required>
                <option value="funcionando">Funcionando (Doação):</option>
                <option value="estragado">Estragado (Descarte / Reciclagem)</option>
                <option value="parcial">Funcionando parcialmente (Pode render peças)</option>
            </select>

            <label for="descricao">Descrição (Marca / modelo/ problema se houver): </label>
            <textarea id="descricao" name="descricao" rows="4"></textarea>

            <button type="submit">Registrar Equipamento</button>
        </form>
    <div>


        </form>
    </div>
</body>

</html>
